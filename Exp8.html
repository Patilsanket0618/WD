<!DOCTYPE html>
<html>
<head>
    <title>Fruit Table</title>
</head>

<body>

    <h2 align="center">Grocery Table</h2>

    <table border="1" align="center" cellpadding="5">
        <caption><b>Monthly Grocery Bill</b></caption>

        <thead>
            <tr>
                <th>Sr. No.</th>
                <th>Item Name</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Total</th>
            </tr>
        </thead>

        <tr>
            <td>1</td>
            <td>Rice</td>
            <td>5 kg</td>
            <td>60</td>
            <td>300</td>
        </tr>

        <tr>
            <td>2</td>
            <td>Wheat</td>
            <td>4 kg</td>
            <td>45</td>
            <td>180</td>
        </tr>

        <tr>
            <td>3</td>
            <td>Sugar</td>
            <td>5 kg</td>
            <td>30</td>
            <td>150</td>
        </tr>

        <tr>
            <td rowspan="2">4</td>
            <td rowspan="2">Fruits</td>
            <td>Apples</td>
            <td>120</td>
            <td>240</td>
        </tr>

        <tr>
            <td>Bananas</td>
            <td>40</td>
            <td>80</td>
        </tr>

        <tr>
            <td colspan="4" align="center"><b>Total</b></td>
            <td><b>965</b></td>
        </tr>

    </table>

</body>
</html>
