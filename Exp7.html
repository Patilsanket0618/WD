<!DOCTYPE html>
<html>
<head>
    <title>Registration</title>
</head>
<body>

<h1>Registration Form</h1>

<form>

    <label>First Name :</label>
    <input type="text" required>

    <label>Middle Name:</label>
    <input type="text" required>

    <label>Last Name:</label>
    <input type="text" required><br><br>

    <label>Address :</label>
    <input type="text" required><br><br>

    <label>Mobile No.:</label>
    <input type="text" required><br><br>

    <h3>Gender</h3>
    <label>Male</label>
    <input type="radio" name="gender" required>

    <label>Female</label>
    <input type="radio" name="gender" required><br><br>

    <label><b>Choose a College :</b></label>
    <select required>
        <option value="">Select College</option>
        <option>Dr.D.Y.Patil College Of Engineering and Technology Kasaba Bawada, Kolhapur</option>
        <option>Indian Institute of Technology Bombay, Mumbai</option>
        <option>VNIT, Nagpur</option>
    </select><br><br>

    <label><b>Choose a Department :</b></label>
    <select required>
        <option value="">Select Department</option>
        <option>Computer Science And Engineering</option>
        <option>Chemical Engineering</option>
        <option>AIML</option>
    </select><br><br>

    <label><b>Technical Skills:</b></label><br>

    <label>HTML</label>
    <input type="checkbox" required><br>

    <label>C++</label>
    <input type="checkbox" required><br>

    <label>Java</label>
    <input type="checkbox" required><br>

    <label>Python</label>
    <input type="checkbox" required><br><br>

    <a href="exp4.html">
        <button type="button">Submit</button>
    </a>

</form>

</body>
</html>
